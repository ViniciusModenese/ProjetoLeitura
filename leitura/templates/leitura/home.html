<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstanteAberta - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .card { background-color: #1e1e1e; border: none; transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); }
        .card-title { color: #00d4ff; }
        .btn-primary { background-color: #00d4ff; border: none; color: #121212; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">📚 EstanteAberta: Seus Livros</h1>
        
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for livro in livros %}
            <div class="col">
                <div class="card h-100 shadow">
                    {% if livro.capa %}
                        <img src="{{ livro.capa.url }}" class="card-img-top" alt="{{ livro.titulo }}" style="height: 400px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ livro.titulo }}</h5>
                        <p class="card-text text-secondary">Autor: {{ livro.autor }}</p>
                        <p class="card-text">{{ livro.sinopse|truncatewords:20 }}</p>
                    </div>
                    <div class="card-footer bg-transparent border-0">
                        <a href="{% url 'detalhes_livro' livro.pk %}" class="btn btn-primary w-100">Ler Resenhas</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
