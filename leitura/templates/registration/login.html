<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EstanteAberta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1e1e1e; border: none; border-radius: 15px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background-color: #2c2c2c; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #2c2c2c; border-color: #00d4ff; color: white; box-shadow: none; }
        .btn-primary { background-color: #00d4ff; border: none; color: #121212; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-primary:hover { background-color: #00b8e6; transform: translateY(-2px); }
        label { margin-bottom: 0.5rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="text-center mb-4">📚 EstanteAberta</h2>
        <p class="text-center text-secondary mb-4">Entre para gerenciar suas resenhas</p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control">
            </div>
            
            <div class="mb-4">
                <label for="id_password">Senha</label>
                <input type="password" name="password" required id="id_password" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary py-2">Entrar</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'home' %}" class="text-decoration-none text-info small">← Voltar para a Home</a>
        </div>
    </div>

</body>
</html>
