<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EstanteAberta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1e1e1e; border: none; border-radius: 15px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background-color: #2c2c2c; border: 1px solid #444; color: white; }
        .btn-primary { background-color: #00d4ff; border: none; color: #121212; font-weight: bold; width: 100%; }
        label { margin-bottom: 0.5rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg text-center">
        <h2 class="mb-4 text-info">📚 EstanteAberta</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" required id="id_username" class="form-control">
            </div>
            <div class="mb-4 text-start">
                <label for="id_password">Senha</label>
                <input type="password" name="password" required id="id_password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary py-2 mb-3">Entrar</button>
        </form>
        <p class="small text-secondary">Não tem uma conta? <a href="{% url 'cadastro' %}" class="text-info text-decoration-none fw-bold">Cadastre-se aqui</a></p>
        <a href="{% url 'home' %}" class="text-decoration-none text-muted small">← Voltar para a Home</a>
    </div>
</body>
</html>
